title: Making Utter Sense
author: Olivia Illa
email: your-email@example.com
description: >-
  A simple static blog for writing down thoughts.
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "https://alisonycchu.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
theme: null # We are building a custom theme
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-last-modified-at

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache
  - .jekyll-metadata

