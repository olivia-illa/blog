---
layout: default
---
<style>
  /* --- TYPOGRAPHY & FONT PROPORTIONS --- */
  .post-body {
    font-size: 1.05rem;     /* Slightly elevated base size for readability */
    line-height: 1.75;      /* Comfortable line height */
  }

  .post-body p {
    margin-bottom: 1.25rem; /* Proportional spacing between paragraphs */
  }

  /* Harmonious heading proportions */
  .post-body h1 {
    font-size: 2.2rem;
    line-height: 1.2;
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  .post-body h2 {
    font-size: 1.65rem;     /* Proportional subheader size */
    line-height: 1.3;
    margin-top: 2rem;
    margin-bottom: 0.8rem;
    border-bottom: none !important; /* Remove the underline/border from markdown ## headers */
  }

  .post-body h3 {
    font-size: 1.3rem;
    line-height: 1.4;
    margin-top: 1.5rem;
    margin-bottom: 0.6rem;
  }

  /* Meta & Date proportions */
  .post-date {
    font-size: 0.9rem;
    opacity: 0.8;
    margin-bottom: 1.5rem;
  }

  .post-tags {
    font-size: 0.85rem;
    margin-top: 2rem;
    opacity: 0.85;
  }

  /* --- LINKS & FOOTNOTES --- */
  /* Underline all links inside the post content by default */
  .post-body a {
    text-decoration: underline;
    text-underline-offset: 2px; /* Keeps it neat and readable */
  }

  .post-body a:hover {
    text-decoration: underline;
  }

  /* Remove underlines from footnote numbers inside paragraphs before hover */
  .post-body sup a {
    text-decoration: none;
  }

  .post-body sup a:hover {
    text-decoration: underline;
  }

  /* --- BULLET POINTS: Custom ⊹ marker with wide spacing --- */
  .post-body ul,
  .thoughts_style ul {
    list-style-type: "⊹ "; 
    padding-left: 1.5em;   
    margin-top: 1em;
    margin-bottom: 1.5em;
  }

  .post-body ul li,
  .thoughts_style ul li {
    margin-bottom: 0.6em;  
    line-height: 1.6;
  }

  .post-body ul ul,
  .thoughts_style ul ul {
    margin-top: 0.4em;
    margin-bottom: 0.4em;
    list-style-type: "◦ "; 
  }

  /* --- FOOTNOTES LIST STYLING --- */
  .post-body ol.footnotes-list {
    list-style: none;
    counter-reset: footnote-counter; 
    padding-left: 2em;               
    margin-top: 1.5em;
    font-size: 0.9rem;              /* Proportionally smaller for footnotes */
  }

  .post-body ol.footnotes-list li {
    counter-increment: footnote-counter;
    position: relative;
    margin-bottom: 0.8em;            
    text-align: left;
  }

  .post-body ol.footnotes-list li::before {
    content: attr(data-number);      
    position: absolute;
    right: 100%;                     
    padding-right: 0.5em;            
    text-align: right;
    white-space: nowrap;
  }

  /* --- QUOTES STYLE --- */
  .post-body blockquote {
    border-left: 2px solid #034f84;  
    margin: 1.5em 0;
    padding-left: 1rem;              
    font-style: italic;
    color: #555;
  }
  .post-body blockquote p {
    margin: 0;                       
  }
</style>

<article>
  <p class="post-date">
    <time id="post-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%d %B %Y %H:%M" }}
    </time>
  </p>
  
  <div class="post-body">
    {{ content }}
  </div>

  {% if page.tags.size > 0 %}
    <div class="post-tags">
      Tags: {{ page.tags | join: ", " }}
    </div>
  {% endif %}
  
</article>

<script>
  (function() {
    var dateEls = document.querySelectorAll('#post-date, .post-updated-time');
    if (!dateEls.length) return;

    var formatter = new Intl.DateTimeFormat('en-GB', {
      month: 'long',
      day: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });

    dateEls.forEach(function(timeEl) {
      var iso = timeEl.getAttribute('datetime');
      if (!iso) return;
      var date = new Date(iso);
      if (isNaN(date.getTime())) return;
      timeEl.textContent = formatter.format(date);
    });
  })();
</script>
