---
layout: default
---
<style>
  /* Import the clean monospaced fonts to keep your original aesthetic */
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Fira+Code:wght@300;400;500;600&display=swap');

  /* Apply the clean monospaced style across the article layout */
  article {
    font-family: "IBM Plex Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-weight: 400;
  }

  /* Headings maintain the same structural mono look */
  article h1, article h2, article h3, article h4 {
    font-family: "IBM Plex Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-weight: 600;
  }

  /* Underline all links inside the post content by default */
  .post-body a {
    text-decoration: underline;
    text-underline-offset: 2px; /* Keeps it neat and readable */
  }

  /* Your existing hover code still works, but this ensures it stays styled correctly */
  .post-body a:hover {
    text-decoration: underline;
  }

  /* Remove underlines from footnote numbers inside paragraphs before hover */
  .post-body sup a {
    text-decoration: none;
  }

  /* Optional - adds the underline back only when someone hovers over the footnote number */
  .post-body sup a:hover {
    text-decoration: underline;
  }

  /* BULLET POINTS: Change default style to ⊹ and widen spacing */
  .post-body ul {
    list-style-type: "⊹ "; /* Sets the default marker and adds a tiny trailing space */
    padding-left: 1.5em;   /* Ensures proper indentation for the custom character */
  }

  .post-body ul li {
    margin-bottom: 0.6em;  /* Widens the spacing slightly between each item */
    line-height: 1.6;      /* Ensures good readability for multi-line items */
  }

  /* Keep nested lists or numbered lists clean */
  .post-body ol {
    padding-left: 1.5em;
  }
  
  .post-body ol li {
    margin-bottom: 0.6em;
    line-height: 1.6;
  }

  /* RESET & SETUP: Turn the footnote list into a self-numbering machine */
  .post-body ol.footnotes-list {
    list-style: none;
    counter-reset: footnote-counter; /* Creates a clean counter */
    padding-left: 2em;               /* Global left boundary for the text column */
    margin-top: 1.5em;
  }

  /* ALIGNMENT: Turn each footnote item into a true list behavior block */
  .post-body ol.footnotes-list li {
    counter-increment: footnote-counter;
    position: relative;
    margin-bottom: 0.8em;            /* Spacing between footnotes */
    text-align: left;
  }

  /* THE MAGIC LAYER: This acts as a real list marker floating outside the text boundary */
  .post-body ol.footnotes-list li::before {
    content: attr(data-number);      /* Grabs your custom ¹, ², ¹⁰ symbols */
    position: absolute;
    right: 100%;                     /* Pushes the number completely out to the left */
    padding-right: 0.5em;            /* Creates a crisp gap between number and text */
    text-align: right;
    white-space: nowrap;
  }

  /* Creates a clean vertical gap between the tags line and the update line */
  .post-updated {
    margin-top: 0.4em; 
    display: block;
  }
</style>

<article>
  <h1>{{ page.title }}</h1>
  
  <!-- Original Post Date kept exactly as it was before -->
  <p class="post-date">
    <time class="js-format-date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%d %B %Y %H:%M" }}
    </time>
  </p>
  
  <div class="post-body">
    {{ content }}
  </div>

  <!-- Tags Line -->
  {% if page.tags.size > 0 %}
    <div class="post-tags">
      Tags: {{ page.tags | join: ", " }}
    </div>
  {% endif %}
  
  <!-- Last Updated Line: per-post git commit date via jekyll-last-modified-at -->
  {% if page.last_modified_at %}
    <div class="post-tags post-updated">
      Last Updated:
      <time class="js-format-date" datetime="{{ page.last_modified_at | date_to_xmlschema }}">
        {{ page.last_modified_at | date: "%d %B %Y %H:%M" }}
      </time>
    </div>
  {% endif %}
</article>

<script>
  (function() {
    var dateEls = document.querySelectorAll('.js-format-date');
    if (!dateEls.length) return;

    var formatter = new Intl.DateTimeFormat('en-GB', {
      month: 'long',
      day: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });

    dateEls.forEach(function(timeEl) {
      var iso = timeEl.getAttribute('datetime');
      if (!iso) return;
      var date = new Date(iso);
      if (isNaN(date.getTime())) return;
      timeEl.textContent = formatter.format(date);
    });
  })();
</script>
